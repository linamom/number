<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Counter | 프리미엄 카운터</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <meta name="description" content="고급스러운 카운터 웹 어플리케이션입니다.">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="counter-card">
            <h1>Dynamic Counter</h1>
            <div id="counterValue" class="counter-display">0</div>
            
            <div class="controls">
                <button id="decrementBtn" class="btn-decrement">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <button id="incrementBtn" class="btn-increment">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <button id="resetBtn" class="btn-reset">RESET</button>
                <button id="saveBtn" class="btn-save">SAVE to DATABASE</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
